# OopsBox tmux config
# Colors: bg=#09090b  bg2=#111113  bg3=#1f1f23  border=#27272a
#         text=#fafafa  text2=#a1a1aa  text3=#71717a
#         accent=#f97316  accent2=#fb923c  green=#22c55e

# ── Prefix ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind r source-file ~/.tmux.conf \; display-message " tmux.conf reloaded"

# ── Core ────────────────────────────────────────────────
set -g default-command "bash -l"
set -g default-shell /bin/bash
set -g mouse off
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# ── True color + clipboard (OSC 52 → browser via ttyd) ──
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ",xterm-256color:clipboard"
set -s set-clipboard on
set -g allow-passthrough on

# ── ttyd-specific fixes ──────────────────────────────────
set -g history-limit 5000
set -as terminal-overrides ",*:smcup@:rmcup@"
set -g window-size latest
setw -g aggressive-resize on
setw -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# ── Vi copy mode ─────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# ── Mouse toggle (C-a m) — turn off to allow browser text selection ──
bind m set-option -g mouse \; display-message "mouse: #{?mouse,on,off}"

# ── Splits ───────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation ──────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Window navigation ────────────────────────────────────
bind -n M-Left  previous-window
bind -n M-Right next-window

# ─────────────────────────────────────────────────────────
# Visual design
# ─────────────────────────────────────────────────────────

# Pane borders
set -g pane-border-style         "fg=#27272a"
set -g pane-active-border-style  "fg=#f97316"

# Status bar
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#111113,fg=#a1a1aa"

# Left: session name pill
set -g status-left-length 28
set -g status-left "#[bg=#f97316,fg=#09090b,bold] #S #[bg=#111113,fg=#f97316]\ue0b0#[default] "

# Right: date + time
set -g status-right-length 26
set -g status-right "#[fg=#27272a]│ #[fg=#71717a]%a %d %b  #[fg=#a1a1aa,bold]%H:%M "

# Inactive windows
setw -g window-status-separator ""
setw -g window-status-format \
  "#[fg=#27272a] │ #[fg=#71717a]#{window_index} #[fg=#a1a1aa]#{window_name}#{?window_zoomed_flag, ⬡,} "

# Active window
setw -g window-status-current-format \
  "#[fg=#27272a] │ #[fg=#f97316,bold]#{window_index} #[fg=#fafafa,bold]#{window_name}#{?window_zoomed_flag, ⬡,} #[fg=#f97316]●#[default] "

# Messages + copy mode
set -g message-style         "bg=#1f1f23,fg=#fb923c,bold"
set -g message-command-style "bg=#1f1f23,fg=#f97316"
setw -g mode-style           "bg=#f97316,fg=#09090b,bold"
