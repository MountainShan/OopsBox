# OopsBox tmux config
# Colors: bg=#0f0f17  bg2=#18181b  bg3=#27272a  border=#3f3f46
#         text=#e4e4e7  text2=#a1a1aa  text3=#71717a
#         accent=#e94560  accent2=#60a5fa  green=#4ade80

# ── Prefix ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind r source-file ~/.tmux.conf \; display-message " tmux.conf reloaded"

# ── Core ────────────────────────────────────────────────
set -g default-command "bash -l"
set -g default-shell /bin/bash
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# ── True color + clipboard (OSC 52 → browser via ttyd) ──
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:Tc"
set -as terminal-features ",xterm-256color:clipboard"
set -s set-clipboard on

# ── ttyd-specific fixes ──────────────────────────────────
set -g history-limit 5000
set -as terminal-overrides ",*:smcup@:rmcup@"
set -g window-size latest
setw -g aggressive-resize on
setw -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# ── Vi copy mode ─────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# ── Splits ───────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation ──────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Window navigation ────────────────────────────────────
bind -n M-Left  previous-window
bind -n M-Right next-window

# ─────────────────────────────────────────────────────────
# Visual design
# ─────────────────────────────────────────────────────────

# Pane borders
set -g pane-border-style         "fg=#27272a"
set -g pane-active-border-style  "fg=#e94560"

# Status bar
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#18181b,fg=#a1a1aa"

# Left: session name pill
set -g status-left-length 28
set -g status-left "#[bg=#e94560,fg=#0f0f17,bold] #S #[bg=#18181b,fg=#e94560]\ue0b0#[default] "

# Right: date + time
set -g status-right-length 26
set -g status-right "#[fg=#3f3f46]│ #[fg=#71717a]%a %d %b  #[fg=#a1a1aa,bold]%H:%M "

# Inactive windows
setw -g window-status-separator ""
setw -g window-status-format \
  "#[fg=#3f3f46] │ #[fg=#71717a]#{window_index} #[fg=#a1a1aa]#{window_name}#{?window_zoomed_flag, ⬡,} "

# Active window
setw -g window-status-current-format \
  "#[fg=#3f3f46] │ #[fg=#e94560,bold]#{window_index} #[fg=#e4e4e7,bold]#{window_name}#{?window_zoomed_flag, ⬡,} #[fg=#e94560]●#[default] "

# Messages + copy mode
set -g message-style         "bg=#27272a,fg=#60a5fa,bold"
set -g message-command-style "bg=#27272a,fg=#e94560"
setw -g mode-style           "bg=#e94560,fg=#0f0f17,bold"
