set -g default-command "bash -l"
set -g default-shell /bin/bash
set -g mouse on

# ── True color support ──
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── Theme: sourced from file, switchable dark/light ──
if-shell "grep -q 'TTYD_THEME=dark' ~/.config/ttyd-theme.conf" {
    # Dark status bar
    set -g status-style "bg=#12141a,fg=#5c6178"
    set -g status-left "#[bg=#6b7280,fg=#e8eaf0,bold]  #S #[bg=#12141a,fg=#6b7280] "
    set -g status-right "#[fg=#2a2d3a]│#[fg=#5c6178] %H:%M #[bg=#6b7280,fg=#e8eaf0,bold] #h "
    set -g window-status-format "#[fg=#5c6178] #I #[fg=#7b7f9e]#W "
    set -g window-status-current-format "#[bg=#1e2130,fg=#c9cdd8,bold] #I #[fg=#e8eaf0]#W #[fg=#10b981]● "
    set -g window-status-separator "#[fg=#2a2d3a]│"
    # Dark pane borders
    set -g pane-border-style "fg=#1e2130"
    set -g pane-active-border-style "fg=#5c6178"
    # Dark message & copy mode
    set -g message-style "bg=#1e2130,fg=#e8eaf0,bold"
    set -g message-command-style "bg=#1e2130,fg=#f59e0b"
    set -g mode-style "bg=#2a2d3a,fg=#e8eaf0"
    # Dark clock
    set -g clock-mode-colour "#6b7280"
    # Dark window activity
    setw -g window-status-activity-style "fg=#f59e0b,bg=#12141a"
    setw -g window-status-bell-style "fg=#ef4444,bg=#12141a,bold"
}

if-shell "grep -q 'TTYD_THEME=light' ~/.config/ttyd-theme.conf" {
    # Light status bar
    set -g status-style "bg=#eceef2,fg=#8b8fa3"
    set -g status-left "#[bg=#4b5563,fg=#f4f5f7,bold]  #S #[bg=#eceef2,fg=#4b5563] "
    set -g status-right "#[fg=#d8dbe3]│#[fg=#8b8fa3] %H:%M #[bg=#4b5563,fg=#f4f5f7,bold] #h "
    set -g window-status-format "#[fg=#8b8fa3] #I #[fg=#6b7280]#W "
    set -g window-status-current-format "#[bg=#d8dbe3,fg=#3b3f51,bold] #I #[fg=#1a1d2b]#W #[fg=#059669]● "
    set -g window-status-separator "#[fg=#d8dbe3]│"
    # Light pane borders
    set -g pane-border-style "fg=#d8dbe3"
    set -g pane-active-border-style "fg=#8b8fa3"
    # Light message & copy mode
    set -g message-style "bg=#d8dbe3,fg=#1a1d2b,bold"
    set -g message-command-style "bg=#d8dbe3,fg=#d97706"
    set -g mode-style "bg=#d8dbe3,fg=#1a1d2b"
    # Light clock
    set -g clock-mode-colour "#4b5563"
    # Light window activity
    setw -g window-status-activity-style "fg=#d97706,bg=#eceef2"
    setw -g window-status-bell-style "fg=#dc2626,bg=#eceef2,bold"
}

# ── Status bar layout ──
set -g status-position bottom
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 40
set -g status-interval 5

# ── Window behavior ──
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g monitor-activity on
set -g visual-activity off

# ── Fix ttyd issues ──
# Reduce scrollback to prevent ttyd re-rendering entire history on reconnect
set -g history-limit 5000
# Disable alternate screen clearing (prevents jump-to-top on app exit)
set -ga terminal-overrides ",*:smcup@:rmcup@"
# Reduce escape time for faster response
set -sg escape-time 10
# Aggressive resize — adapt to ttyd window size
setw -g aggressive-resize on
# Disable activity flash — prevents terminal flashing
setw -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
