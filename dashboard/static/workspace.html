<!-- dashboard/static/workspace.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OopsBox — Workspace</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    body { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
    nav { flex-shrink: 0; }
    .workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .tab-bar { flex-shrink: 0; padding: 8px 12px; background: var(--bg2); border-bottom: 1px solid var(--bg3); display: flex; align-items: center; gap: 8px; }
    .tab-panels { flex: 1; overflow: hidden; position: relative; }
    .tab-panel { position: absolute; inset: 0; overflow: hidden; }
    .tab-panel.hidden { display: none; }

    /* Terminal panel */
    #termPanel { display: flex; flex-direction: column; }
    #toolbarContainer { flex-shrink: 0; }
    #termFrame { flex: 1; border: none; background: #000; }

    /* Files panel */
    #filesPanel { overflow-y: auto; padding: 16px; }
    .file-list { display: flex; flex-direction: column; gap: 2px; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 6px;
      cursor: pointer; font-size: 13px;
    }
    .file-item:hover { background: var(--bg3); }
    .file-item .icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
    .file-item .name { flex: 1; color: var(--text); }
    .file-item .size { color: var(--text3); font-size: 11px; font-family: var(--mono); }
    .file-item .actions { display: none; gap: 4px; }
    .file-item:hover .actions { display: flex; }
    .breadcrumb { font-size: 13px; color: var(--text3); margin-bottom: 12px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .breadcrumb span { cursor: pointer; color: var(--accent2); }
    .breadcrumb span:hover { text-decoration: underline; }
    .files-toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    .files-toolbar input[type="file"] { display: none; }
  </style>
</head>
<body>
  <nav>
    <a href="/" style="color:var(--text3);font-size:13px;">← Dashboard</a>
    <span class="nav-brand" style="margin-left:8px;">>_ <span style="color:var(--accent)">Oops</span>Box</span>
    <span id="projectBadge" style="font-size:12px;color:var(--text3);font-family:var(--mono)"></span>
    <span class="nav-spacer"></span>
    <div id="statusBadge"></div>
  </nav>

  <div class="workspace">
    <div class="tab-bar">
      <div class="tabs" style="width:200px">
        <div class="tab active" id="tabTerminal" onclick="switchTab('terminal')">Terminal</div>
        <div class="tab" id="tabFiles" onclick="switchTab('files')">Files</div>
      </div>
    </div>

    <div class="tab-panels">
      <!-- Terminal Tab -->
      <div class="tab-panel" id="termPanel">
        <div id="toolbarContainer"></div>
        <iframe id="termFrame" src="" allow="clipboard-read; clipboard-write"></iframe>
      </div>

      <!-- Files Tab -->
      <div class="tab-panel hidden" id="filesPanel">
        <div class="files-toolbar">
          <button class="btn-secondary btn-sm" onclick="goUp()">↑ Up</button>
          <button class="btn-secondary btn-sm" onclick="newFolder()">+ Folder</button>
          <label class="btn-secondary btn-sm" style="cursor:pointer">
            Upload <input type="file" id="uploadInput" multiple onchange="uploadFiles(this)">
          </label>
        </div>
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="file-list" id="fileList">
          <div style="color:var(--text3)">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/terminal.js"></script>
  <script src="/static/js/files.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const PROJECT = params.get('project');
    if (!PROJECT) { location.href = '/'; throw new Error('no project'); }

    document.getElementById('projectBadge').textContent = PROJECT;
    document.title = `${PROJECT} — OopsBox`;

    // Init terminal
    initToolbar(PROJECT, 'toolbarContainer');
    document.getElementById('termFrame').src = `/terminal/${PROJECT}/`;

    // Load project status
    async function loadStatus() {
      try {
        const p = await api.projects.status(PROJECT);
        const badge = document.getElementById('statusBadge');
        const isRunning = !!p.running;
        const cls = isRunning ? 'green' : 'gray';
        const label = isRunning ? 'running' : 'stopped';
        badge.innerHTML = `<span class="badge badge-${cls}"><span class="dot dot-${cls}"></span>${label}</span>`;
      } catch (_) {}
    }
    loadStatus();

    // Tab switching
    let currentTab = 'terminal';
    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('termPanel').classList.toggle('hidden', tab !== 'terminal');
      document.getElementById('filesPanel').classList.toggle('hidden', tab !== 'files');
      document.getElementById('tabTerminal').classList.toggle('active', tab === 'terminal');
      document.getElementById('tabFiles').classList.toggle('active', tab === 'files');
      if (tab === 'files') initFiles(PROJECT);
    }
  </script>
</body>
</html>
