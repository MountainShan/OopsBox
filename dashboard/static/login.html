<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png?v=5">
<title>OopsBox — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Comic Neue',-apple-system,sans-serif;height:100vh;display:flex;align-items:center;
  justify-content:center;background:#0e1015;color:#c8ccd5;padding:20px}
.card{text-align:center;max-width:320px;width:100%}
.logo{font-size:28px;font-weight:700;margin-bottom:4px;color:#e8ecf0}
.logo span{color:#e07840;font-style:italic}
.tagline{font-size:11px;color:#6b7080;margin-bottom:28px;font-style:italic}
.field{margin-bottom:12px;text-align:left}
.field label{display:block;font-size:11px;color:#6b7080;margin-bottom:4px}
.field input{width:100%;padding:10px 14px;border:1px solid #252830;border-radius:10px;
  background:#161920;color:#e8ecf0;font-size:14px;outline:none;font-family:'Comic Neue',sans-serif}
.field input:focus{border-color:#e07840}
button{width:100%;padding:12px;border-radius:10px;border:none;background:#e07840;color:#fff;
  font-size:14px;font-weight:700;cursor:pointer;font-family:'Comic Neue',sans-serif;margin-top:4px}
button:hover{opacity:.85}
button:active{transform:scale(.97)}
.err{color:#e05050;font-size:12px;min-height:18px;margin-bottom:8px}
.hint{font-size:10px;color:#6b7080;margin-top:20px}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>Oops</span>Box</div>
  <div class="tagline">I just wanted to code on iPad.</div>
  <div class="err" id="err"></div>
  <div class="field">
    <label>Username</label>
    <input id="user" autocapitalize="none" autocorrect="off" autofocus>
  </div>
  <div class="field">
    <label>Password</label>
    <input id="pass" type="password" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button onclick="doLogin()">let me in</button>
  <div class="hint">credentials in ~/upw.txt</div>
</div>
<script>
async function doLogin(){
  const user=document.getElementById('user').value.trim();
  const pass=document.getElementById('pass').value;
  const err=document.getElementById('err');
  if(!user||!pass){err.textContent='fill in both fields';return;}
  try{
    const r=await fetch('/api/auth/login',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:user,password:pass})});
    if(r.ok){
      const next=new URLSearchParams(location.search).get('next')||'/';
      location.href=next;
    } else {
      const d=await r.json();
      err.textContent=d.detail||'nope';
    }
  }catch(e){err.textContent='something broke';}
}
// Auto-redirect if already logged in
fetch('/api/auth/status').then(r=>r.json()).then(d=>{
  if(d.authenticated)location.href='/';
});
</script>
</body>
</html>
