<!-- dashboard/static/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OopsBox — Login</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; }
    .login-box {
      width: 100%; max-width: 360px; padding: 20px;
    }
    .logo {
      text-align: center; margin-bottom: 32px;
    }
    .logo h1 { font-size: 28px; font-weight: 800; }
    .logo h1 span { color: var(--accent); }
    .logo p { color: var(--text3); font-size: 13px; margin-top: 4px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .error-msg { color: #fca5a5; font-size: 13px; margin-bottom: 12px; display: none; }
    .submit-btn { width: 100%; padding: 10px; font-size: 15px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <h1>>_ <span>Oops</span>Box</h1>
      <p>somehow alive</p>
    </div>
    <div class="card">
      <div class="error-msg" id="error"></div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" autofocus>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>
      <button class="btn-primary submit-btn" id="loginBtn" onclick="doLogin()">Sign in</button>
    </div>
  </div>
  <script src="/static/js/api.js"></script>
  <script>
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('error');
      btn.disabled = true;
      err.style.display = 'none';
      try {
        await api.auth.login(
          document.getElementById('username').value,
          document.getElementById('password').value
        );
        window.location.href = '/';
      } catch (e) {
        err.textContent = e.message || 'Login failed';
        err.style.display = 'block';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
