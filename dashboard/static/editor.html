<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png?v=5">
<title>OopsBox — Workspace</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/material-darker.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/dialog/dialog.min.css">
<link rel="stylesheet" href="/static/css/theme.css">
<link rel="stylesheet" href="/static/css/file-manager.css">
<link rel="stylesheet" href="/static/css/editor.css">
</head>
<body>

<div id="workspace">
  <!-- Tab bar -->
  <div class="ws-tabs">
    <button class="ws-tab on" id="ws-tab-files" onclick="TERM.wsSwitch('files')">
      <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      Files
    </button>
    <button class="ws-tab" id="ws-tab-term" onclick="TERM.wsSwitch('term')">
      <svg viewBox="0 0 24 24"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
      Terminal
    </button>
    <button class="ws-tab" id="ws-tab-local" onclick="TERM.wsSwitch('local')" style="display:none">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Local
    </button>
  </div>

  <!-- File Manager -->
  <div id="file-manager" style="position:relative">
    <div class="fm-toolbar">
      <div class="fm-breadcrumb" id="fm-breadcrumb"></div>
      <div class="fm-search-wrap">
        <span class="fm-search-icon">🔍</span>
        <input class="fm-search" id="fm-search" type="text" placeholder="Search..." autocomplete="off" spellcheck="false">
        <div class="fm-search-results" id="fm-search-results"></div>
      </div>
      <button class="fm-btn" onclick="FM.showNewFileModal()">+ New</button>
      <button class="fm-btn" onclick="FM.showNewFolderModal()">New Folder</button>
      <button class="fm-btn" onclick="FM.triggerUpload()">Upload</button>
      <button class="fm-btn" onclick="FM.downloadSelected()">Download</button>
      <button class="fm-btn" onclick="FM.loadDir(FM.getCurrentDir())">Refresh</button>
      <input type="file" id="file-upload-input" style="display:none" onchange="FM.handleUpload(event)" multiple>
    </div>
    <div class="fm-batch-bar" id="fm-batch-bar">
      <span class="fm-batch-count" id="fm-batch-count">0 selected</span>
      <button class="tb-btn" onclick="FM.batchDownload()">⬇️ Download</button>
      <button class="tb-btn" onclick="FM.batchCopy()">📋 Copy</button>
      <button class="tb-btn" onclick="FM.batchCut()">✂️ Cut</button>
      <button class="tb-btn danger" onclick="FM.batchDelete()">🗑️ Delete</button>
    </div>
    <div class="fm-upload-progress" id="fm-upload-progress"></div>
    <div class="fm-table-wrap" id="fm-table-wrap">
      <table class="fm-table" id="fm-table">
        <colgroup>
          <col id="col-check" style="width:36px">
          <col id="col-icon" style="width:44px">
          <col id="col-name">
          <col id="col-size" style="width:80px">
          <col id="col-mtime" style="width:110px">
        </colgroup>
        <thead><tr>
          <th class="fm-col-check"><input type="checkbox" id="fm-select-all" title="Select all"></th>
          <th class="fm-col-icon"></th>
          <th data-sort="name" onclick="FM.setSort('name')">Name <span class="sort-icon">▲</span><div class="col-resize" data-col="2"></div></th>
          <th class="fm-col-size" data-sort="size" onclick="FM.setSort('size')">Size <span class="sort-icon">▲</span><div class="col-resize" data-col="3"></div></th>
          <th class="fm-col-mtime" data-sort="mtime" onclick="FM.setSort('mtime')">Modified <span class="sort-icon">▲</span></th>
        </tr></thead>
        <tbody id="fm-body"></tbody>
      </table>
    </div>
    <div class="fm-drop-overlay" id="fm-drop-overlay"><span class="fm-drop-text">Drop files to upload</span></div>
  </div>

  <!-- Terminal -->
  <div id="terminal-panel" class="hidden">
    <div class="term-bar">
      <button class="tb-btn danger" onclick="TERM.sendKey('\x03')" title="Ctrl+C">^C</button>
      <button class="tb-btn" onclick="TERM.sendKey('\x04')" title="Ctrl+D">^D</button>
      <button class="tb-btn" onclick="TERM.sendKey('\x1a')" title="Ctrl+Z">^Z</button>
      <button class="tb-btn" onclick="TERM.sendKey('\x0c')" title="Ctrl+L (clear)">^L</button>
      <button class="tb-btn" onclick="TERM.sendKey('\t')" title="Tab (autocomplete)">Tab</button>
      <button class="tb-btn" onclick="TERM.sendKey('\x1b[A')" title="Up arrow">▲</button>
      <button class="tb-btn" onclick="TERM.sendKey('\x1b[B')" title="Down arrow">▼</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="mouse-toggle" onclick="TERM.toggleMouse()">
        <svg viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="18" rx="6"/><line x1="12" y1="7" x2="12" y2="11"/></svg>
        <span id="mouse-label">Select Mode</span>
      </button>
      <button class="tb-btn" onclick="TERM.copyFromTmux()">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
      <span class="copy-ok" id="copy-ok">Copied!</span>
      <span class="term-hint" id="mouse-hint"></span>
    </div>
    <iframe class="term-frame" id="term-iframe" src="" allow="clipboard-read;clipboard-write"></iframe>
    <iframe class="term-frame" id="local-iframe" src="" allow="clipboard-read;clipboard-write" style="display:none"></iframe>
  </div>

</div>

<!-- Editor Modal -->
<div id="editor-modal" class="modal-overlay">
  <div class="modal-inner">
    <div class="editor-toolbar">
      <span class="editor-filename" id="editor-filename"></span>
      <span class="editor-modified" id="editor-modified"></span>
      <div style="flex:1"></div>
      <button class="tb-btn" id="md-preview-btn" onclick="EDITOR.togglePreview()" style="display:none">Preview</button>
      <button class="tb-btn" onclick="EDITOR.doUndo()">Undo</button>
      <button class="tb-btn" onclick="EDITOR.doRedo()">Redo</button>
      <button class="tb-btn" onclick="EDITOR.findReplace()">Find</button>
      <div class="tb-sep"></div>
      <button class="tb-btn primary" onclick="EDITOR.save()">Save</button>
      <button class="tb-btn" onclick="EDITOR.saveAs()">Save As</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="EDITOR.closeEditor()">&#10005; Close</button>
    </div>
    <div class="editor-body">
      <div id="editor-wrap" class="editor-wrap"></div>
      <div id="md-preview" class="md-preview"></div>
    </div>
    <div class="editor-info">
      <span id="info-path">--</span>
      <span class="saved-indicator" id="saved-ind">Saved</span>
      <span id="info-chunk" style="color:var(--accent)"></span>
      <div id="chunk-nav" style="display:none;gap:3px;align-items:center">
        <button class="ib-nav" onclick="EDITOR.loadChunk('first')" title="First chunk">⏮</button>
        <button class="ib-nav" onclick="EDITOR.loadChunk('prev')" title="Previous chunk">◀</button>
        <button class="ib-nav" onclick="EDITOR.loadChunk('next')" title="Next chunk">▶</button>
        <button class="ib-nav" onclick="EDITOR.loadChunk('last')" title="Last chunk">⏭</button>
        <button class="ib-nav" onclick="EDITOR.jumpToLine()" title="Go to line">⤓</button>
      </div>
      <span style="flex:1"></span>
      <span id="info-lang">--</span>
      <span id="info-pos">Ln 1, Col 1</span>
    </div>
  </div>
</div>

<!-- Image Modal -->
<div id="image-modal" class="modal-overlay">
  <div class="modal-inner">
    <div class="editor-toolbar">
      <span class="editor-filename" id="image-filename"></span>
      <div style="flex:1"></div>
      <button class="tb-btn" onclick="EDITOR.downloadCurrentImage()">Download</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="EDITOR.closeImageModal()">&#10005; Close</button>
    </div>
    <div class="image-body">
      <img id="image-el" src="">
    </div>
  </div>
</div>

<!-- New File Modal -->
<div class="small-modal-bg" id="newfile-modal">
  <div class="small-modal">
    <h3>New File</h3>
    <input id="newfile-path" placeholder="filename.ext" autocomplete="off" spellcheck="false"
           onkeydown="if(event.key==='Enter')FM.createNewFile()">
    <div class="small-modal-hint">Created in current directory. Use path/file for subdirs.</div>
    <div class="small-modal-actions">
      <button class="fm-btn" onclick="FM.hideNewFileModal()">Cancel</button>
      <button class="fm-btn" style="background:var(--accent);color:#fff;border-color:transparent" onclick="FM.createNewFile()">Create</button>
    </div>
  </div>
</div>

<!-- New Folder Modal -->
<div class="small-modal-bg" id="newfolder-modal">
  <div class="small-modal">
    <h3>New Folder</h3>
    <input id="newfolder-path" placeholder="folder-name" autocomplete="off" spellcheck="false"
           onkeydown="if(event.key==='Enter')FM.createNewFolder()">
    <div class="small-modal-hint">Created in current directory.</div>
    <div class="small-modal-actions">
      <button class="fm-btn" onclick="FM.hideNewFolderModal()">Cancel</button>
      <button class="fm-btn" style="background:var(--accent);color:#fff;border-color:transparent" onclick="FM.createNewFolder()">Create</button>
    </div>
  </div>
</div>

<!-- Context Menu -->
<div class="fm-context-menu" id="fm-context-menu"></div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/meta.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/shell/shell.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/markdown/markdown.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/yaml/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/toml/toml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/go/go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/rust/rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/clike/clike.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/dockerfile/dockerfile.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/nginx/nginx.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/sql/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/search/search.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/search/searchcursor.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/search/jump-to-line.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/dialog/dialog.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

<script type="module">
import FM from '/static/js/file-manager.js';
import EDITOR from '/static/js/editor.js';
import TERM from '/static/js/terminal.js';
import { PROJECT } from '/static/js/api.js';

// Initialize mermaid
mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' });

// Initialize modules
TERM.init();
FM.init();

// Keyboard shortcuts (Escape for modals)
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('newfolder-modal').classList.contains('open')) { FM.hideNewFolderModal(); return; }
    if (document.getElementById('newfile-modal').classList.contains('open')) { FM.hideNewFileModal(); return; }
    if (document.getElementById('editor-modal').classList.contains('open')) { EDITOR.closeEditor(); return; }
    if (document.getElementById('image-modal').classList.contains('open')) { EDITOR.closeImageModal(); return; }
  }
});

// Load initial directory
if (PROJECT) FM.loadDir('');
</script>
</body>
</html>
