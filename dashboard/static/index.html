<!-- dashboard/static/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OopsBox</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
      margin-top: 20px;
    }
    .project-card {
      background: var(--bg2);
      border: 1px solid var(--bg3);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .project-card:hover { border-color: var(--border); }
    .project-card.running { border-left: 3px solid var(--green); }
    .project-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .project-name { font-weight: 600; font-size: 15px; flex: 1; }
    .project-type { font-size: 11px; color: var(--text3); font-family: var(--mono); }
    .project-actions { display: flex; gap: 6px; margin-top: 12px; }
    .stats-bar {
      display: flex; gap: 16px;
      padding: 10px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--bg3);
      font-size: 12px; color: var(--text3);
      font-family: var(--mono);
    }
    .stat { display: flex; gap: 5px; align-items: center; }
    .stat-val { color: var(--text2); }
    .header-row { display: flex; align-items: center; justify-content: space-between; }
    h2 { font-size: 20px; }
  </style>
</head>
<body>
  <nav>
    <span class="nav-brand">>_ <span style="color:var(--accent)">Oops</span>Box</span>
    <span class="nav-spacer"></span>
    <div id="statsBar" class="stat" style="font-family:var(--mono);font-size:12px;color:var(--text3)"></div>
    <button class="btn-secondary btn-sm" onclick="api.auth.logout().then(()=>location.href='/login')">Logout</button>
  </nav>

  <div class="page">
    <div class="header-row">
      <h2>Projects</h2>
      <button class="btn-primary btn-sm" onclick="showCreateModal()">+ New Project</button>
    </div>

    <div id="projectList" class="projects-grid">
      <div class="empty-state" style="grid-column:1/-1">
        <p style="color:var(--text3)">Loading...</p>
      </div>
    </div>
  </div>

  <!-- Create Project Modal -->
  <div id="createModal" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2>New Project</h2>
      <div class="field">
        <label>Project Name</label>
        <input type="text" id="newName" placeholder="my-project" autofocus>
      </div>
      <div class="field">
        <label>Type</label>
        <select id="newType" onchange="toggleSSHFields()">
          <option value="local">Local</option>
          <option value="ssh">SSH Remote</option>
        </select>
      </div>
      <div id="sshFields" style="display:none">
        <div class="field"><label>SSH Host</label><input type="text" id="sshHost" placeholder="192.168.1.100"></div>
        <div class="field"><label>SSH User</label><input type="text" id="sshUser" placeholder="ubuntu"></div>
        <div class="field"><label>SSH Port</label><input type="number" id="sshPort" value="22"></div>
        <div class="field"><label>Remote Path</label><input type="text" id="remotePath" placeholder="/home/ubuntu"></div>
        <div class="field"><label>Password (optional)</label><input type="password" id="sshPassword"></div>
      </div>
      <div class="actions">
        <button class="btn-secondary" onclick="hideCreateModal()">Cancel</button>
        <button class="btn-primary" onclick="createProject()">Create</button>
      </div>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    async function loadProjects() {
      const projects = await api.projects.list();
      renderProjects(projects);
    }

    function renderProjects(projects) {
      const el = document.getElementById('projectList');
      if (!projects.length) {
        el.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <h3>No projects yet</h3>
          <p>Click "+ New Project" to get started</p>
        </div>`;
        return;
      }
      el.innerHTML = projects.map(p => `
        <div class="project-card ${p.running ? 'running' : ''}" onclick="openProject('${p.name}')">
          <div class="project-card-header">
            <span class="project-name">${p.name}</span>
            <span class="badge ${p.running ? 'badge-green' : 'badge-gray'}">
              <span class="dot ${p.running ? 'dot-green' : 'dot-gray'}"></span>
              ${p.running ? 'running' : 'stopped'}
            </span>
          </div>
          <div class="project-type">${p.type}${p.ssh_host ? ` · ${p.ssh_host}` : ''}</div>
          <div class="project-actions" onclick="event.stopPropagation()">
            ${p.running
              ? `<button class="btn-secondary btn-sm" onclick="stopProject('${p.name}')">Stop</button>`
              : `<button class="btn-primary btn-sm" onclick="startProject('${p.name}')">Start</button>`
            }
            <button class="btn-danger btn-sm" onclick="deleteProject('${p.name}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function openProject(name) {
      window.location.href = `/workspace?project=${encodeURIComponent(name)}`;
    }

    async function startProject(name) {
      try {
        await api.projects.start(name);
        await loadProjects();
      } catch (e) { showToast(e.message, true); }
    }

    async function stopProject(name) {
      try {
        await api.projects.stop(name);
        await loadProjects();
      } catch (e) { showToast(e.message, true); }
    }

    async function deleteProject(name) {
      if (!confirm(`Delete project "${name}"? This cannot be undone.`)) return;
      try {
        await api.projects.delete(name);
        await loadProjects();
      } catch (e) { showToast(e.message, true); }
    }

    function showCreateModal() { document.getElementById('createModal').style.display = 'flex'; }
    function hideCreateModal() { document.getElementById('createModal').style.display = 'none'; }
    function toggleSSHFields() {
      const show = document.getElementById('newType').value === 'ssh';
      document.getElementById('sshFields').style.display = show ? 'block' : 'none';
    }

    async function createProject() {
      const name = document.getElementById('newName').value.trim();
      const type = document.getElementById('newType').value;
      if (!name) return;
      const data = { name, type };
      if (type === 'ssh') {
        data.ssh_host = document.getElementById('sshHost').value;
        data.ssh_user = document.getElementById('sshUser').value;
        data.ssh_port = parseInt(document.getElementById('sshPort').value) || 22;
        data.remote_path = document.getElementById('remotePath').value;
        data.ssh_password = document.getElementById('sshPassword').value || null;
      }
      try {
        await api.projects.create(data);
        hideCreateModal();
        await loadProjects();
        showToast(`Project "${name}" created`);
      } catch (e) { showToast(e.message, true); }
    }

    async function loadStats() {
      try {
        const s = await api.system.stats();
        document.getElementById('statsBar').textContent =
          `CPU ${s.cpu_percent.toFixed(0)}%  RAM ${(s.ram.used/1e9).toFixed(1)}/${(s.ram.total/1e9).toFixed(1)}GB  Disk ${(s.disk.used/1e9).toFixed(0)}/${(s.disk.total/1e9).toFixed(0)}GB`;
      } catch (_) {}
    }

    loadProjects();
    loadStats();
    setInterval(loadProjects, 10000);
    setInterval(loadStats, 5000);
  </script>
</body>
</html>
