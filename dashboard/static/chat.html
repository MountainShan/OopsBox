<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png?v=5">
<title>OopsBox — AI Agent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e1015;--bg2:#161920;--bg3:#1e2028;--border:#252830;--text:#c8ccd5;--text-hi:#e8ecf0;
  --muted:#6b7080;--accent:#e07840;--red:#e05050;--green:#10b981;
  --color-read:#3b82f6;--color-edit:#f59e0b;--color-bash:#10b981;--color-grep:#a78bfa;--color-write:#22d3ee}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);
  height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

.header{padding:3px 10px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;flex-shrink:0}
.header .title{font-size:12px;font-weight:600;color:var(--text-hi);flex:1}
.header .state{font-size:10px;color:var(--muted);font-family:monospace}
.header button{padding:2px 7px;border-radius:3px;font-size:10px;cursor:pointer;
  border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .12s}
.header button:hover{color:var(--text);background:var(--bg3)}

.messages{flex:1;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
.msg{margin-bottom:10px;padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.6;max-width:95%}
.msg.user{background:var(--bg3);color:var(--text-hi);margin-left:auto;border-bottom-right-radius:2px}
.msg.assistant{background:var(--bg2);border:1px solid var(--border);border-bottom-left-radius:2px}
.msg.tool{background:var(--bg);border:1px solid var(--border);font-size:11px;color:var(--muted);font-family:monospace;padding:4px 8px;margin-bottom:4px}
.msg-empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:12px}

/* Step block color coding (#4) */
.msg.assistant .step-block{border-left:3px solid var(--border);padding-left:8px;margin:.5em 0}
.msg.assistant .step-block.step-read{border-left-color:var(--color-read)}
.msg.assistant .step-block.step-edit,.msg.assistant .step-block.step-update{border-left-color:var(--color-edit)}
.msg.assistant .step-block.step-bash{border-left-color:var(--color-bash)}
.msg.assistant .step-block.step-grep,.msg.assistant .step-block.step-search{border-left-color:var(--color-grep)}
.msg.assistant .step-block.step-write{border-left-color:var(--color-write)}
.msg.assistant .step-block .step-header{font-size:11px;font-weight:600;display:flex;align-items:center;gap:4px;margin-bottom:2px}
.msg.assistant .step-block.step-read .step-header{color:var(--color-read)}
.msg.assistant .step-block.step-edit .step-header,.msg.assistant .step-block.step-update .step-header{color:var(--color-edit)}
.msg.assistant .step-block.step-bash .step-header{color:var(--color-bash)}
.msg.assistant .step-block.step-grep .step-header,.msg.assistant .step-block.step-search .step-header{color:var(--color-grep)}
.msg.assistant .step-block.step-write .step-header{color:var(--color-write)}

/* Expandable truncated output (#2) */
.truncated-toggle{display:inline-block;font-size:11px;color:var(--accent);cursor:pointer;margin-top:4px;user-select:none}
.truncated-toggle:hover{text-decoration:underline}
.truncated-content{display:none;white-space:pre-wrap;font-size:12px}
.truncated-content.expanded{display:block}

/* Markdown */
.msg.assistant h1,.msg.assistant h2,.msg.assistant h3{color:var(--text-hi);margin:.8em 0 .4em;font-weight:700}
.msg.assistant h1{font-size:1.3em} .msg.assistant h2{font-size:1.15em} .msg.assistant h3{font-size:1.05em}
.msg.assistant p{margin:.4em 0}
.msg.assistant code{background:var(--bg);padding:1px 4px;border-radius:3px;font-size:.9em;font-family:monospace}
.msg.assistant pre,.msg.tool_output pre{background:#12141a;border:1px solid #1e2130;border-radius:6px;padding:10px 12px;overflow-x:auto;margin:.6em 0;font-size:12px;line-height:1.5}
.msg.assistant pre code,.msg.tool_output pre code{background:none;padding:0;font-size:12px;color:#c9cdd8}
pre code .hljs-keyword{color:#a78bfa}
pre code .hljs-string{color:#f59e0b}
pre code .hljs-number{color:#10b981}
pre code .hljs-comment{color:#5c6178;font-style:italic}
pre code .hljs-function,pre code .hljs-title.function_{color:#60a5fa}
pre code .hljs-title{color:#60a5fa}
pre code .hljs-built_in{color:#22d3ee}
pre code .hljs-type{color:#22d3ee}
pre code .hljs-attr,pre code .hljs-property{color:#e8eaf0}
pre code .hljs-variable{color:#e8eaf0}
pre code .hljs-params{color:#c9cdd8}
pre code .hljs-literal{color:#ef4444}
pre code .hljs-selector-class,pre code .hljs-selector-tag{color:#f59e0b}
pre code .hljs-tag,pre code .hljs-name{color:#ef4444}
pre code .hljs-meta{color:#a78bfa}
pre code .hljs-regexp{color:#f59e0b}
pre code .hljs-symbol{color:#10b981}
pre code .hljs-operator{color:#c9cdd8}
.code-block{position:relative;margin:.6em 0}
.code-block .code-lang{position:absolute;top:0;right:0;padding:2px 8px;font-size:9px;color:#5c6178;background:#1a1d26;border-radius:0 6px 0 4px;text-transform:uppercase;letter-spacing:.5px}
.code-block pre{margin:0;border-radius:6px}
.msg.tool_output{background:transparent;border:none;padding:0 12px;margin-top:-6px;margin-bottom:10px}
.msg.assistant ul,.msg.assistant ol{padding-left:20px;margin:.4em 0}
.msg.assistant blockquote{border-left:3px solid var(--border);padding-left:10px;color:var(--muted);margin:.4em 0}
.msg.assistant a{color:#60a5fa;text-decoration:none}
.msg.assistant table{border-collapse:collapse;margin:.4em 0;font-size:12px}
.msg.assistant th,.msg.assistant td{border:1px solid var(--border);padding:4px 8px}
.msg.assistant th{background:var(--bg3)}

/* Prompt area — inline at bottom of messages, not a separate fixed bar */
.prompt-area{display:none}
.prompt-inline{padding:8px 0;display:flex;flex-direction:column;gap:3px}
.prompt-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.prompt-choices{display:flex;flex-wrap:wrap;gap:4px}
.prompt-choice{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;
  border:1px solid var(--border);background:var(--bg2);color:var(--text);transition:all .12s;user-select:none;min-height:36px}
.prompt-choice:hover{background:var(--bg3);border-color:var(--accent)}
.prompt-choice input[type="checkbox"],.prompt-choice input[type="radio"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.prompt-confirm{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;
  border:none;background:var(--accent);color:#fff;transition:all .12s;min-height:36px}
.prompt-confirm:hover{opacity:.85}
.thinking-indicator{font-size:11px;color:var(--muted);font-style:italic;padding:4px 0}
.thinking-bubble{margin-bottom:10px;padding:8px 12px;border-radius:8px;font-size:13px;
  background:var(--bg2);border:1px solid var(--border);border-bottom-left-radius:2px;max-width:95%;
  color:var(--muted);font-style:italic;display:flex;align-items:center;gap:8px}
.thinking-bubble .dot-pulse{display:flex;gap:3px}
.thinking-bubble .dot-pulse span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:pulse 1.2s ease-in-out infinite}
.thinking-bubble .dot-pulse span:nth-child(2){animation-delay:.2s}
.thinking-bubble .dot-pulse span:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* Input area (#3 toolbar redesign) */
.input-area{padding:4px 8px;border-top:1px solid var(--border);background:var(--bg2);
  display:flex;flex-direction:column;gap:3px;padding-bottom:calc(4px + env(safe-area-inset-bottom,0px));flex-shrink:0;position:relative}
.toolbar{display:flex;gap:2px;flex-wrap:wrap;align-items:center}
.toolbar.collapsed .tb-group{display:none}
.tb-toggle{min-width:28px;min-height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px;
  border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .12s;flex-shrink:0}
.tb-toggle:hover{color:var(--text);background:var(--bg3)}
.tb-toggle svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;transition:transform .2s}
.toolbar.collapsed .tb-toggle svg{transform:rotate(180deg)}
.tb-group{display:flex;gap:2px;align-items:center}
.tb-sep{width:1px;height:16px;background:var(--border);margin:0 3px;flex-shrink:0}
.tb-btn{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);
  cursor:pointer;transition:all .12s;font-size:12px;font-weight:600;font-family:monospace;-webkit-tap-highlight-color:transparent}
.tb-btn:hover{color:var(--text);background:var(--bg3)}
.tb-btn:active{background:var(--bg);transform:scale(.95)}
.tb-btn.danger{color:var(--red)}
.tb-btn.danger:hover{background:color-mix(in srgb,var(--red) 10%,transparent)}
.tb-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2}

/* File chips (#10) */
.file-chips{display:flex;flex-wrap:wrap;gap:4px;padding:2px 0}
.file-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;
  background:color-mix(in srgb,var(--accent) 12%,transparent);border:0.5px solid color-mix(in srgb,var(--accent) 30%,transparent);color:var(--text)}
.file-chip .chip-remove{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:0 2px;line-height:1}
.file-chip.uploading{opacity:.6}
.file-chip.error{border-color:var(--red);background:color-mix(in srgb,var(--red) 10%,transparent)}

.input-row{display:flex;gap:6px;align-items:flex-end}
.input-row textarea{flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg);color:var(--text-hi);font-size:13px;outline:none;resize:none;
  font-family:-apple-system,sans-serif;height:36px;max-height:120px;line-height:1.4}
.input-row textarea:focus{border-color:var(--accent)}
.input-row textarea::placeholder{color:var(--muted)}
.attach-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;
  border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .12s;flex-shrink:0}
.attach-btn:hover{color:var(--text);background:var(--bg3)}
.attach-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2}
.send-btn{padding:0 14px;height:36px;border-radius:8px;border:none;background:var(--accent);color:#fff;
  font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;flex-shrink:0}
.send-btn:hover{opacity:.85}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

.slash-popup{display:none;position:absolute;bottom:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;max-height:220px;overflow-y:auto;z-index:50;box-shadow:0 -4px 16px rgba(0,0,0,.4);margin-bottom:4px}
.slash-popup.show{display:block}
.slash-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;transition:background .1s}
.slash-item:hover,.slash-item.active{background:var(--bg3)}
.slash-cmd{color:var(--accent);font-weight:600;font-size:13px;font-family:monospace;min-width:140px}
.slash-desc{color:var(--muted);font-size:12px}

.spin{display:inline-block;width:10px;height:10px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

.tool-call{margin:4px 0;border:1px solid var(--border);border-radius:6px;overflow:hidden;font-size:12px}
.tool-call-header{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg2);cursor:pointer;user-select:none}
.tool-call-header:hover{background:var(--bg3)}
.tool-call-icon{font-size:14px}
.tool-call-name{font-weight:600;font-size:12px}
.tool-call-param{color:var(--muted);font-family:monospace;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.tool-call-status{font-size:10px;padding:1px 6px;border-radius:3px}
.tool-call-status.ok{color:var(--green);background:color-mix(in srgb,var(--green) 10%,transparent)}
.tool-call-status.err{color:var(--red);background:color-mix(in srgb,var(--red) 10%,transparent)}
.tool-call-arrow{color:var(--muted);font-size:10px;transition:transform .2s}
.tool-call-arrow.open{transform:rotate(90deg)}
.tool-call-body{display:none;padding:8px 10px;border-top:1px solid var(--border);background:var(--bg);font-family:monospace;white-space:pre-wrap;max-height:300px;overflow-y:auto;font-size:11px;color:var(--muted);line-height:1.5}
.tool-call-body.show{display:block}
.tool-call.tc-read{border-left:3px solid var(--color-read)}
.tool-call.tc-edit,.tool-call.tc-update{border-left:3px solid var(--color-edit)}
.tool-call.tc-bash{border-left:3px solid var(--color-bash)}
.tool-call.tc-grep,.tool-call.tc-search,.tool-call.tc-glob{border-left:3px solid var(--color-grep)}
.tool-call.tc-write{border-left:3px solid var(--color-write)}

/* Skills Panel */
.skills-panel{display:none;background:var(--bg2);border-bottom:1px solid var(--border);max-height:50vh;overflow:hidden;flex-direction:column;flex-shrink:0}
.skills-panel.open{display:flex}
.skills-header{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--border)}
.skills-title{font-size:12px;font-weight:600;color:var(--text-hi)}
.skills-count{font-size:10px;color:var(--muted);background:var(--bg3);padding:1px 6px;border-radius:8px}
.skills-close{margin-left:auto;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 4px}
.skills-close:hover{color:var(--text)}
.skills-filter{margin:6px 10px;padding:5px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;outline:none}
.skills-filter:focus{border-color:var(--accent)}
.skills-list{overflow-y:auto;padding:0 6px 6px;-webkit-overflow-scrolling:touch}
.skill-item{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:5px;cursor:pointer;transition:background .1s}
.skill-item:hover{background:var(--bg3)}
.skill-cmd{font-size:11px;font-weight:600;color:var(--accent);font-family:monospace;white-space:nowrap;min-width:fit-content}
.skill-desc{font-size:11px;color:var(--muted);line-height:1.4;overflow:hidden;text-overflow:ellipsis}
.skill-source{font-size:9px;color:var(--border);margin-top:1px}
.skill-type{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:500;white-space:nowrap}
.skill-type.user{background:#10b98120;color:var(--green)}
.skill-type.agent{background:#3b82f620;color:var(--color-read)}
</style>
</head>
<body>

<div class="header">
  <div class="title" id="title">AI Agent</div>
  <span class="state" id="state-display"></span>
  <button onclick="toggleSkillsPanel()" title="Available Skills">&#9889; Skills</button>
  <button onclick="refreshAndScroll()">&#8635;</button>
  <button onclick="scrollToBottom()">&#8595;</button>
</div>

<!-- Skills Panel -->
<div class="skills-panel" id="skills-panel">
  <div class="skills-header">
    <span class="skills-title">Available Skills</span>
    <span class="skills-count" id="skills-count"></span>
    <button class="skills-close" onclick="toggleSkillsPanel()">&times;</button>
  </div>
  <input class="skills-filter" id="skills-filter" type="text" placeholder="Filter skills..." autocomplete="off">
  <div class="skills-list" id="skills-list"></div>
</div>

<div class="messages" id="messages">
  <div class="msg-empty">Loading conversation...</div>
</div>

<div class="input-area">
  <!-- Toolbar (#3 redesigned) -->
  <div class="toolbar" id="toolbar">
    <button class="tb-toggle" onclick="toggleToolbar()" title="Toggle toolbar">
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="tb-group" id="tb-signals">
      <button class="tb-btn danger" onclick="sendKey('C-c')" title="Ctrl+C">^C</button>
      <button class="tb-btn" onclick="sendKey('C-d')" title="Ctrl+D">^D</button>
      <button class="tb-btn" onclick="sendKey('Escape')" title="Escape">Esc</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-group" id="tb-nav">
      <button class="tb-btn" onclick="sendKey('Up')" title="Up">
        <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
      <button class="tb-btn" onclick="sendKey('Down')" title="Down">
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <button class="tb-btn" onclick="sendKey('Enter')" title="Enter">&#9166;</button>
      <button class="tb-btn" onclick="sendKey('Space')" title="Space">&#9251;</button>
    </div>
    <div class="tb-sep"></div>
    <div class="tb-group" id="tb-extra">
      <button class="tb-btn" onclick="sendKey('Tab')" title="Tab">Tab</button>
      <button class="tb-btn" onclick="sendKey('BTab')" title="Shift+Tab">&#8679;Tab</button>
      <button class="tb-btn" onclick="sendKey('y')" title="Yes">y</button>
      <button class="tb-btn" onclick="sendKey('n')" title="No">n</button>
    </div>
  </div>

  <!-- File chips (#10) -->
  <div class="file-chips" id="file-chips"></div>

  <!-- Slash command autocomplete popup -->
  <div class="slash-popup" id="slash-popup"></div>

  <!-- Input row -->
  <div class="input-row">
    <input type="file" id="file-input" style="display:none" onchange="handleUpload(this)" multiple>
    <button class="attach-btn" id="attach-btn" onclick="document.getElementById('file-input').click()" title="Attach file">
      <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </button>
    <textarea id="input" rows="1" placeholder="Type a message..."
              onkeydown="handleInputKey(event)"
              oninput="autoGrow(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="doSend()">Send</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/go.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
<script>
const params=new URLSearchParams(location.search);
const PROJECT=params.get('project')||'_system';
const WINDOW=PROJECT==='_system'?'system':PROJECT;
document.getElementById('title').textContent=PROJECT==='_system'?'System Agent':PROJECT;

let messages=[];
let lastMsgCount=0;
let autoScroll=true;
let currentState='idle';
const MAX_FILE_SIZE=50*1024*1024; // 50MB

const renderer=new marked.Renderer();
renderer.code=function({text,lang}){
  let highlighted;
  if(lang&&hljs.getLanguage(lang)){
    try{highlighted=hljs.highlight(text,{language:lang}).value}catch(e){highlighted=text}
  }else{
    try{highlighted=hljs.highlightAuto(text).value}catch(e){highlighted=text}
  }
  const langLabel=lang?`<span class="code-lang">${lang}</span>`:'';
  return `<div class="code-block">${langLabel}<pre><code>${highlighted}</code></pre></div>`;
};
marked.setOptions({breaks:true,gfm:true,renderer});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Tool call rendering ──
const TOOL_ICONS={Read:'📄',Edit:'✏️',Write:'📝',Bash:'>_',Grep:'🔍',Glob:'📁',Agent:'🤖',WebSearch:'🌐',WebFetch:'🌐'};
const TOOL_CSS={Read:'tc-read',Edit:'tc-edit',Write:'tc-write',Bash:'tc-bash',Grep:'tc-grep',Glob:'tc-glob',Search:'tc-grep',Update:'tc-edit'};
let tcId=0;

function renderToolCall(m){
  const id='tc-'+(tcId++);
  const icon=TOOL_ICONS[m.tool]||'🔧';
  const cls=TOOL_CSS[m.tool]||'';
  const sCls=m.status==='error'?'err':'ok';
  const sText=m.status==='error'?'error':'ok';
  let param='';
  const inp=m.input||{};
  if(inp.file_path)param=inp.file_path;
  else if(inp.command)param=inp.command;
  else if(inp.pattern)param=inp.pattern;
  else if(inp.query)param=(inp.query||'').slice(0,60);
  else if(inp.prompt)param=(inp.prompt||'').slice(0,60)+'...';
  else{const k=Object.keys(inp);if(k.length)param=k[0]+': '+String(inp[k[0]]).slice(0,50);}
  const body=m.output_full||m.output_preview||'(no output)';
  return `<div class="tool-call ${cls}"><div class="tool-call-header" onclick="tcToggle('${id}')"><span class="tool-call-icon">${icon}</span><span class="tool-call-name">${esc(m.tool)}</span><span class="tool-call-param">${esc(param)}</span><span class="tool-call-status ${sCls}">${sText}</span><span class="tool-call-arrow" id="${id}-a">▶</span></div><div class="tool-call-body" id="${id}">${esc(body)}</div></div>`;
}

// ── Step block color coding (#4) ──
const STEP_ICONS={Read:'📄',Edit:'✏️',Update:'✏️',Bash:'>_',Grep:'🔍',Search:'🔍',Write:'📝',Glob:'📁'};
const STEP_CLASSES={Read:'step-read',Edit:'step-edit',Update:'step-update',Bash:'step-bash',Grep:'step-grep',Search:'step-search',Write:'step-write',Glob:'step-grep'};

function colorizeSteps(html){
  // Match **ToolName** patterns and wrap in step-block
  return html.replace(/<p><strong>(Read|Edit|Update|Bash|Grep|Search|Write|Glob)\b(.*?)<\/strong>([\s\S]*?)(?=<p><strong>|<\/div>|$)/gi,
    (match,tool,rest,body)=>{
      const cls=STEP_CLASSES[tool]||'';
      const icon=STEP_ICONS[tool]||'';
      return `<div class="step-block ${cls}"><div class="step-header">${icon} <strong>${tool}${rest}</strong></div>${body}</div>`;
    });
}

// ── Expandable truncated output (#2) ──
let truncId=0;
function makeExpandable(html){
  return html.replace(/(\.\.\. \(truncated\))/g,()=>{
    const id='trunc-'+(truncId++);
    return `<span class="truncated-toggle" onclick="toggleTrunc('${id}')">Show full output</span><div class="truncated-content" id="${id}"></div>`;
  });
}
function toggleTrunc(id){
  const el=document.getElementById(id);
  if(!el)return;
  el.classList.toggle('expanded');
  const toggle=el.previousElementSibling;
  if(toggle)toggle.textContent=el.classList.contains('expanded')?'Collapse':'Show full output';

function scrollToBottom(){
  const el=document.getElementById('messages');
  el.scrollTop=el.scrollHeight;

// ── Render messages ──
const MAX_DISPLAY=50;
function render(){
  truncId=0;tcId=0; // Reset so IDs stay consistent across re-renders
  const el=document.getElementById('messages');
  if(!messages.length){
    const hint=currentState==='waiting_text'?'Claude is ready — type a message below to start.':'Waiting for conversation...';
    el.innerHTML=`<div class="msg-empty">${hint}</div>`;
    return;
  }
  const visible=messages.slice(-MAX_DISPLAY);
  let html='';
  if(messages.length>MAX_DISPLAY){
    html+=`<div class="msg-empty" style="padding:10px;font-size:10px">${messages.length-MAX_DISPLAY} earlier messages hidden</div>`;
  }
  for(const m of visible){
    if(m.role==='user'){
      html+=`<div class="msg user">${esc(m.text)}</div>`;
    }else if(m.role==='assistant'){
      let parsed=marked.parse(m.text);
      parsed=colorizeSteps(parsed);
      parsed=makeExpandable(parsed);
      html+=`<div class="msg assistant">${parsed}</div>`;
    }else if(m.role==='tool_call'){
      html+=renderToolCall(m);
    }else if(m.role==='tool_output'){
      let parsed=marked.parse(m.text);
      parsed=makeExpandable(parsed);
      html+=`<div class="msg tool_output">${parsed}</div>`;
    }
  }
  // Show thinking bubble when Claude is processing
  if(currentState==='thinking'){
    html+=`<div class="thinking-bubble"><div class="dot-pulse"><span></span><span></span><span></span></div> Claude is thinking...</div>`;
  }
  el.innerHTML=html;
  if(autoScroll) el.scrollTop=el.scrollHeight;
}

document.getElementById('messages').addEventListener('scroll',function(){
  autoScroll=(this.scrollHeight-this.scrollTop-this.clientHeight)<50;
});

// ── Poll JSONL messages ──
let jsonlPrompt=null;
let polling=false;
let initialLoad=true;
let currentSessionFile='';
async function pollMessages(){
  if(polling)return;polling=true;
  try{
    const url=`/api/projects/${PROJECT}/session-messages?after=${lastMsgCount}`;
    const r=await fetch(url,{credentials:'include',redirect:'error'});
    if(!r.ok){polling=false;return;}
    const d=await r.json();
    if(currentSessionFile&&d.session_file&&d.session_file!==currentSessionFile){
      messages=d.messages.slice(-MAX_DISPLAY);
      lastMsgCount=d.total;
      currentSessionFile=d.session_file;
      render();setTimeout(scrollToBottom,50);
    }else if(initialLoad){
      messages=d.messages.slice(-MAX_DISPLAY);
      lastMsgCount=d.total;
      currentSessionFile=d.session_file||'';
      initialLoad=false;
      render();setTimeout(scrollToBottom,50);
    }else if(d.total<lastMsgCount){
      lastMsgCount=0;polling=false;return pollMessages();
    }else if(d.messages&&d.messages.length){
      for(const msg of d.messages){
        if(msg.role==='user'){
          const idx=messages.findIndex(m=>m._optimistic&&m.role==='user'&&m.text===msg.text);
          if(idx>=0){messages[idx]=msg;}else{messages.push(msg);}
        }else{messages.push(msg);}
      }
      if(messages.length>MAX_DISPLAY*2) messages=messages.slice(-MAX_DISPLAY);
      lastMsgCount=d.total;
      currentSessionFile=d.session_file||currentSessionFile;
      render();
    }
    jsonlPrompt=d.pending_prompt||null;
  }catch(e){}
  polling=false;
}

// ── Poll prompt state ──
let promptPaused=false;
let promptPauseTimer=null;
function pausePrompt(ms){
  promptPaused=true;
  removeInlinePrompt();
  if(promptPauseTimer)clearTimeout(promptPauseTimer);
  promptPauseTimer=setTimeout(()=>{promptPaused=false;},ms||3000);
}
function removeInlinePrompt(){
  const old=document.getElementById('inline-prompt');
  if(old)old.remove();
}
async function pollState(){
  if(promptPaused)return;
  try{
    const r=await fetch(`/api/projects/${PROJECT}/prompt-state`,{credentials:'include',redirect:'error'});
    if(!r.ok)return;
    const d=await r.json();
    const prevState=currentState;
    currentState=d.state;
    if(currentState!==prevState) render();
    const stateEl=document.getElementById('state-display');
    if(d.state==='no_session'){
      stateEl.textContent='tmux session not found';stateEl.style.color='red';
    }else if(d.state==='claude_stopped'){
      stateEl.textContent='Claude stopped — restarting...';stateEl.style.color='red';
      fetch(`/api/projects/${PROJECT}/send-text?window=${WINDOW}&session=agents`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({text:'claude-loop.sh '+WINDOW}),credentials:'include'
      });
    }else{
      stateEl.style.color='';
      stateEl.textContent=
        d.state==='thinking'?'thinking...':
        d.state==='waiting_choice'?'waiting for choice':
        d.state==='waiting_text'?'ready':'';
    }
    // If we have a JSONL-detected prompt, use it
    if(jsonlPrompt&&jsonlPrompt.type==='permission'){
      renderPermissionPrompt(jsonlPrompt);
    }else{
      renderPrompt(d);
    }
  }catch(e){}
}

async function selectChoice(num){
  await sendKey(num);
  await new Promise(r=>setTimeout(r,200));
  await sendKey('Enter');
  pausePrompt(5000);
}

function renderPrompt(d){
  const msgEl=document.getElementById('messages');
  removeInlinePrompt();

  if(d.state==='waiting_choice'&&d.choices.length){
    const hasCheckbox=d.choices.some(c=>c.checked!==undefined);
    // Show tool context (description of what's being executed) above the choices
    const ctx=(d.tool_context||[]).map(l=>esc(l)).join('<br>');
    const ctxHtml=ctx?`<div style="font-size:11px;color:var(--muted);font-family:monospace;margin-bottom:8px;padding:6px 8px;background:var(--bg);border-radius:4px;line-height:1.6;white-space:pre-wrap;word-break:break-all">${ctx}</div>`:'';
    let html=`<div class="prompt-inline" id="inline-prompt"><div class="prompt-title">Choose an option</div>${ctxHtml}<div class="prompt-choices">`;
    if(hasCheckbox){
      html+=d.choices.map((c,i)=>{
        const icon=c.checked?'☑':'☐';
        return `<div class="prompt-choice" onclick="selectCheckbox(${i})">
          <span>${icon}</span><span>${esc(c.text)}</span></div>`;
      }).join('');
      html+=`</div><button class="prompt-confirm" onclick="confirmChoice()">Confirm</button></div>`;
    }else{
      html+=d.choices.map(c=>{
        return `<div class="prompt-choice" onclick="selectChoice('${c.num}')">
          <span style="font-weight:700;color:var(--accent)">${c.num}.</span><span>${esc(c.text)}</span></div>`;
      }).join('');
      html+=`</div></div>`;
    }
    msgEl.insertAdjacentHTML('beforeend',html);
    if(autoScroll) scrollToBottom();
  }else if(d.state==='thinking'){
    // Thinking is shown as a bubble in messages (already handled by render)
  }
}

function renderPermissionPrompt(prompt){
  const msgEl=document.getElementById('messages');
  removeInlinePrompt();

  const toolName=prompt.tool||'tool';
  const input=prompt.input||{};
  let detail='';
  if(input.file_path)detail=input.file_path;
  else if(input.command)detail=input.command;

  let html=`<div class="prompt-inline" id="inline-prompt">

async function selectCheckbox(idx){
  const state=await (await fetch(`/api/projects/${PROJECT}/prompt-state`,{credentials:'include',redirect:'error'})).json();
  let cursorIdx=0;
  for(let i=0;i<state.choices.length;i++){
    if((state.raw[i]||'').includes('❯')){cursorIdx=i;break;}
  }
  const diff=idx-cursorIdx;
  for(let i=0;i<Math.abs(diff);i++){
    await sendKey(diff>0?'Down':'Up');
    await new Promise(r=>setTimeout(r,100));
  }
  await sendKey('Space');
  setTimeout(pollState,500);
}

// ── File upload (#10 multi-file, spinner, size limit) ──
let uploadedFiles=[];

async function handleUpload(input){
  const files=Array.from(input.files);
  if(!files.length)return;
  const stateEl=document.getElementById('state-display');
  const attachBtn=document.getElementById('attach-btn');
  const sendBtn=document.getElementById('send-btn');

  for(const file of files){
    // Size check
    if(file.size>MAX_FILE_SIZE){
      addChip({filename:file.name,error:`Too large (${(file.size/1024/1024).toFixed(0)}MB > 50MB limit)`});
      continue;
    }
    // Add uploading chip
    const chipId='chip-'+Date.now()+'-'+Math.random().toString(36).slice(2,6);
    addChip({id:chipId,filename:file.name,uploading:true});
    attachBtn.disabled=true;sendBtn.disabled=true;

    try{
      const form=new FormData();
      form.append('file',file);
      const r=await fetch('/api/chat-upload',{method:'POST',body:form,credentials:'include'});
      if(r.redirected||r.status===302)throw new Error('Auth expired — reload page');
      if(!r.ok)throw new Error('Upload failed ('+r.status+')');
      const d=await r.json();
      updateChip(chipId,{...d,id:chipId});
      uploadedFiles.push(d);
      // Auto-append file path to textarea so user can see it
      const ta=document.getElementById('input');
      const line=`\nFile available at: "${d.path}"`;
      ta.value=ta.value?ta.value+line:line.trim();
      autoGrow(ta);
      stateEl.textContent='uploaded';stateEl.style.color='lime';
    }catch(e){
      updateChip(chipId,{id:chipId,filename:file.name,error:e.message});
      stateEl.textContent=`upload error: ${e.message}`;stateEl.style.color='red';
    }
  }
  attachBtn.disabled=false;sendBtn.disabled=false;
  input.value='';
}

function addChip(data){
  const el=document.getElementById('file-chips');
  const chip=document.createElement('div');
  chip.className='file-chip'+(data.uploading?' uploading':'')+(data.error?' error':'');
  chip.id=data.id||'';
  if(data.uploading){
    chip.innerHTML=`<span class="spin"></span> ${esc(data.filename)}`;
  }else if(data.error){
    chip.innerHTML=`📄 ${esc(data.filename)} <span style="color:var(--red);font-size:10px">${esc(data.error)}</span> <button class="chip-remove" onclick="removeChip(this)">&times;</button>`;
  }else{
    const kb=(data.size/1024).toFixed(1);
    chip.innerHTML=`📄 ${esc(data.filename)} <span style="color:var(--muted)">${kb}KB</span> <button class="chip-remove" onclick="removeChip(this,'${esc(data.path)}')">&times;</button>`;
  }
  el.appendChild(chip);
}

function updateChip(id,data){
  const chip=document.getElementById(id);
  if(!chip)return;
  chip.className='file-chip'+(data.error?' error':'');
  if(data.error){
    chip.innerHTML=`📄 ${esc(data.filename)} <span style="color:var(--red);font-size:10px">${esc(data.error)}</span> <button class="chip-remove" onclick="removeChip(this)">&times;</button>`;
  }else{
    const kb=(data.size/1024).toFixed(1);
    chip.innerHTML=`📄 ${esc(data.filename)} <span style="color:var(--muted)">${kb}KB</span> <button class="chip-remove" onclick="removeChip(this,'${esc(data.path)}')">&times;</button>`;
  }
}

function removeChip(btn,path){
  if(path){
    uploadedFiles=uploadedFiles.filter(f=>f.path!==path);
    // Strip the path line from textarea
    const ta=document.getElementById('input');
    ta.value=ta.value.replace(new RegExp('\\n?File available at: "'+path.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'"','g'),'');
    autoGrow(ta);
  }
  btn.closest('.file-chip').remove();
}

function clearAllChips(){

// ── Send text to tmux ──
let sending=false;
async function doSend(){
  if(sending)return;
  sending=true;
  setTimeout(()=>{sending=false;},1000); // debounce 1s
  const el=document.getElementById('input');
  let text=el.value.trim();
  if(!text){sending=false;return;}
  // Clear chips on send (paths already in textarea)
  if(uploadedFiles.length) clearAllChips();
  const stateEl=document.getElementById('state-display');
  stateEl.textContent=`sending text: "${text.slice(0,20)}..."`;stateEl.style.color='yellow';
  el.value='';el.style.height='36px';
  // Optimistic render: show user message immediately (tagged for dedup)
  messages.push({role:'user',text:text,ts:'',_optimistic:true});
  render();scrollToBottom();
  pausePrompt(5000);
  enterFastPoll();
  try{
    const r=await fetch(`/api/projects/${PROJECT}/send-text?window=${WINDOW}&session=agents`,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text}),credentials:'include'
    });
    if(r.ok){stateEl.textContent=`sent OK`;stateEl.style.color='lime';}
    else{stateEl.textContent=`send-text FAIL: ${r.status}`;stateEl.style.color='red';}
  }catch(e){stateEl.textContent=`ERROR: ${e.message}`;stateEl.style.color='red';}
}

// ── Keyboard handling ──
function handleInputKey(e){
  const popup=document.getElementById('slash-popup');
  const isVisible=popup.classList.contains('show');
  if(isVisible){
    const items=popup.querySelectorAll('.slash-item');
    const active=popup.querySelector('.slash-item.active');
    const idx=active?[...items].indexOf(active):-1;
    if(e.key==='ArrowDown'){
      e.preventDefault();
      highlightSlash(Math.min(idx+1,items.length-1));
      return;
    }
    if(e.key==='ArrowUp'){
      e.preventDefault();
      highlightSlash(Math.max(idx-1,0));
      return;
    }
    if(e.key==='Enter'&&!e.shiftKey){
      e.preventDefault();
      if(idx>=0){pickSlash(idx);}else{hideSlash();doSend();}
      return;
    }
    if(e.key==='Escape'){
      e.preventDefault();
      hideSlash();
      return;
    }
  }
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}
}

document.addEventListener('keydown',e=>{
  if(document.activeElement===document.getElementById('input'))return;
  const keyMap={'ArrowUp':'Up','ArrowDown':'Down','ArrowLeft':'Left','ArrowRight':'Right',
    'Enter':'Enter','Escape':'Escape',' ':'Space','Tab':'Tab'};
  if(keyMap[e.key]){
    sendKey(keyMap[e.key]);
    if(e.key==='Enter'||e.key===' ')pausePrompt(3000);
    e.preventDefault();
  }else if(e.key.length===1&&!e.ctrlKey&&!e.metaKey){
    sendKey(e.key);e.preventDefault();
  }else if(e.ctrlKey&&e.key==='c'){
    sendKey('C-c');e.preventDefault();
  }
});

let slashActiveIdx=-1;

function showSlash(items){

    `<div class="slash-item" onmousedown="event.preventDefault();pickSlash(${i})">` +

function highlightSlash(idx){
  const popup=document.getElementById('slash-popup');
  const items=popup.querySelectorAll('.slash-item');
  items.forEach((el,i)=>el.classList.toggle('active',i===idx));
  slashActiveIdx=idx;
  if(items[idx])items[idx].scrollIntoView({block:'nearest'});
}

function pickSlash(idx){
  const popup=document.getElementById('slash-popup');
  const items=popup.querySelectorAll('.slash-item');
  if(!items[idx])return;
  const cmd=items[idx].querySelector('.slash-cmd').textContent;
  const ta=document.getElementById('input');
  ta.value=cmd+' ';
  autoGrow(ta);
  hideSlash();
  ta.focus();
}

// Input event: show/hide popup based on typed /
document.getElementById('input').addEventListener('input',function(){
  const val=this.value;
  if(val.startsWith('/')){
    const q=val.toLowerCase();
    const matches=SLASH_COMMANDS.filter(c=>c.cmd.toLowerCase().startsWith(q));
    if(matches.length>0){showSlash(matches);}else{hideSlash();}
  }else{
    hideSlash();
  }
});

// Close popup on outside click
document.addEventListener('mousedown',function(e){
  if(!e.target.closest('#slash-popup')&&!e.target.closest('#input')){
    hideSlash();
  }
});

// ── iPad fixes ──
document.getElementById('input').addEventListener('focus',function(){
  setTimeout(()=>{document.getElementById('messages').scrollTop=999999},400);
});
document.body.addEventListener('touchmove',function(e){
  if(!e.target.closest('.messages'))e.preventDefault();
},{passive:false});

// ── SSE streaming with polling fallback ──
let eventSource=null;
let sseConnected=false;

function startSSE(){
  if(eventSource)eventSource.close();
  const url=`/api/projects/${PROJECT}/session-stream?after=${lastMsgCount}`;
  eventSource=new EventSource(url);

  eventSource.addEventListener('message',function(e){
    try{
      const msg=JSON.parse(e.data);
      // Dedup: if incoming user message matches an optimistic one, replace it
      if(msg.role==='user'){
        const idx=messages.findIndex(m=>m._optimistic&&m.role==='user'&&m.text===msg.text);
        if(idx>=0){messages[idx]=msg;}else{messages.push(msg);}
      }else if(msg.role==='tool_call'&&msg.tool_use_id){
        // Update existing tool_call if it exists (output may have arrived)
        const idx=messages.findIndex(m=>m.role==='tool_call'&&m.tool_use_id===msg.tool_use_id);
        if(idx>=0){messages[idx]=msg;}else{messages.push(msg);}
      }else{messages.push(msg);}
      if(messages.length>MAX_DISPLAY*2)messages=messages.slice(-MAX_DISPLAY);
      lastMsgCount++;
      render();
    }catch(err){}
  });

  eventSource.addEventListener('state',function(e){
    try{
      const d=JSON.parse(e.data);
      const prev=currentState;
      currentState=d.state;
      if(prev!==currentState)render();
      const stateEl=document.getElementById('state-display');
      stateEl.style.color='';
      stateEl.textContent=
        d.state==='thinking'?'thinking...':
        d.state==='waiting_text'?'ready':'';
    }catch(err){}
  });

  eventSource.onerror=function(){
    sseConnected=false;
    // Fall back to polling, retry SSE in 5s
    startPollingFallback();
    setTimeout(()=>{if(!sseConnected)startSSE();},5000);
  };

  eventSource.onopen=function(){
    sseConnected=true;
    stopPollingFallback();
  };
}

let pollMsgInterval=null;
let pollStateInterval=null;

function startPollingFallback(){
  if(!pollMsgInterval)pollMsgInterval=setInterval(pollMessages,2000);
  if(!pollStateInterval)pollStateInterval=setInterval(pollState,1500);
}

function stopPollingFallback(){
  if(pollMsgInterval){clearInterval(pollMsgInterval);pollMsgInterval=null;}
  // Keep state polling as backup for prompt detection
}

function enterFastPoll(){} // No-op with SSE

// Init: load initial messages, then start SSE
async function init(){
  await pollMessages();
  scrollToBottom();
  startSSE();
  // Always poll state for prompt detection (tmux-based)
  pollStateInterval=setInterval(pollState,2000);
}
init();
</script>
